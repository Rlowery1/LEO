name: Build AAA_Traffic Plugin

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'Plugins/**'
      - 'HostProject/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'Plugins/**'
      - 'HostProject/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-win64:
    name: Build (Win64)

    # Security: this repo is public; do not run untrusted fork PR code on a self-hosted machine.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    runs-on: [self-hosted, windows, x64, ue5-7]

    env:
      UE_ROOT: C:\Program Files\Epic Games\UE_5.7
      PLUGIN_UPLUGIN: ${{ github.workspace }}\Plugins\AAA_Traffic\AAA_Traffic.uplugin
      ARTIFACTS_DIR: ${{ github.workspace }}\Artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine channel (dev vs main)
        shell: powershell
        run: |
          # For push: use the branch that was pushed.
          # For PR: use the target branch (base) so PRs into dev build as 'dev', etc.
          $channel = if ($env:GITHUB_EVENT_NAME -eq 'pull_request') { $env:GITHUB_BASE_REF } else { $env:GITHUB_REF_NAME }
          if ([string]::IsNullOrWhiteSpace($channel)) { $channel = 'unknown' }

          "CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGE_DIR=$($env:ARTIFACTS_DIR)\\AAA_Traffic_$channel" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_PATH=$($env:ARTIFACTS_DIR)\\AAA_Traffic_Win64_$channel.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARTIFACT_NAME=AAA_Traffic_Win64_$channel" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify Unreal Automation Tool
        shell: powershell
        run: |
          $uat = Join-Path $env:UE_ROOT 'Engine\Build\BatchFiles\RunUAT.bat'
          if (-not (Test-Path $uat)) {
            throw "RunUAT not found at: $uat. Update UE_ROOT in the workflow to match your UE install."
          }
          if (-not (Test-Path $env:PLUGIN_UPLUGIN)) {
            throw "Plugin descriptor not found at: $env:PLUGIN_UPLUGIN"
          }
          New-Item -ItemType Directory -Force -Path $env:ARTIFACTS_DIR | Out-Null

      - name: BuildPlugin (Win64)
        shell: powershell
        run: |
          $uat = Join-Path $env:UE_ROOT 'Engine\Build\BatchFiles\RunUAT.bat'

          & $uat BuildPlugin `
            -Rocket `
            -Plugin="$env:PLUGIN_UPLUGIN" `
            -Package="$env:PACKAGE_DIR" `
            -TargetPlatforms=Win64

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip packaged plugin
        shell: powershell
        run: |
          if (Test-Path $env:ZIP_PATH) { Remove-Item -Force $env:ZIP_PATH }
          Compress-Archive -Path "$env:PACKAGE_DIR\*" -DestinationPath $env:ZIP_PATH -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
